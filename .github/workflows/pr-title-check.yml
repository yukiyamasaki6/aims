name: "Lint PR Title"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types
          types: |
            feat
            fix
            style
            refactor
            docs
            chore
          # Allow optional scope
          requireScope: false
          # Validation for subject
          subjectPattern: '.*\(#\d+\)$'
          subjectPatternError: "The PR title must end with an issue number in parentheses. e.g., 'feat(score-ui): implement score component (#12)'"
